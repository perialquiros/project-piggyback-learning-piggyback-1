<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Edit Questions - {{ video_id }}</title>
    <link rel="stylesheet" href="/assets/css/expert_preview.css">
    <style>
        body { font-family: sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
        .page-header { background: #fff; padding: 20px 24px; border-radius: 8px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.1); display: flex; align-items: center; gap: 16px; }
        .page-header h1 { margin: 0; font-size: 1.4rem; }
        .page-header .back-btn { text-decoration: none; color: #555; border: 1px solid #ccc; padding: 6px 14px; border-radius: 6px; font-size: .9rem; }
        .page-header .back-btn:hover { background: #f0f0f0; }

        /* ── Tab nav ── */
        .tab-nav-wrap { background: #fff; border-radius: 8px 8px 0 0; box-shadow: 0 1px 4px rgba(0,0,0,.1); padding: 12px 24px 0; margin-bottom: 0; }
        .tab-nav { display: flex; gap: 4px; }
        .tab-btn { padding: 10px 22px; border: none; background: transparent; border-bottom: 3px solid transparent; cursor: pointer; font-size: .95rem; font-weight: 600; color: #6b7280; border-radius: 6px 6px 0 0; }
        .tab-btn:hover { background: #f9fafb; }
        .tab-btn.active { color: #2563eb; border-bottom: 3px solid #2563eb; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* ── Save bar ── */
        .save-bar { background: #fff; padding: 12px 24px; box-shadow: 0 1px 4px rgba(0,0,0,.1); display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .btn-save { background: #2563eb; color: #fff; border: none; padding: 10px 24px; border-radius: 6px; font-size: 1rem; cursor: pointer; font-weight: 600; }
        .btn-save:hover { background: #1d4ed8; }
        .btn-save:disabled { background: #93c5fd; cursor: default; }
        .status-msg { font-size: .9rem; }
        .status-msg.success { color: #16a34a; }
        .status-msg.error { color: #dc2626; }

        /* ── Edit tab ── */
        .segment-card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.1); margin-bottom: 16px; padding: 20px 24px; }
        .segment-title { font-weight: 700; font-size: 1rem; color: #374151; margin-bottom: 14px; }
        .field-group { margin-bottom: 12px; }
        .field-group label { display: block; font-size: .8rem; font-weight: 600; color: #6b7280; margin-bottom: 4px; text-transform: uppercase; }
        .field-group textarea { width: 100%; box-sizing: border-box; border: 1px solid #d1d5db; border-radius: 6px; padding: 8px 10px; font-size: .95rem; resize: vertical; min-height: 60px; font-family: inherit; }
        .field-group textarea:focus { outline: none; border-color: #2563eb; }
        .regen-btn { background: #f3f4f6; border: 1px solid #d1d5db; padding: 6px 14px; border-radius: 6px; font-size: .85rem; cursor: pointer; }
        .regen-btn:hover { background: #e5e7eb; }
        .regen-btn:disabled { opacity: .5; cursor: default; }
        .type-badge { display: inline-block; background: #ede9fe; color: #6d28d9; padding: 2px 8px; border-radius: 4px; font-size: .75rem; margin-bottom: 8px; }
        .no-data { text-align: center; color: #9ca3af; padding: 60px 20px; }
        .loading { text-align: center; color: #6b7280; padding: 40px; }

        /* ── Companion tab ── */
        .segment-companion { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.1); margin-bottom: 24px; padding: 20px 24px; }
        .persona-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 16px; }
        @media (max-width: 900px) { .persona-grid { grid-template-columns: 1fr; } }

        .persona-col { border-radius: 12px; padding: 16px; }
        .persona-col.bunny    { background: #fdf2f8; border: 2px solid #ec4899; }
        .persona-col.alligator{ background: #f0fdf4; border: 2px solid #22c55e; }
        .persona-col.pig      { background: #faf5ff; border: 2px solid #a855f7; }

        .persona-col-title { font-size: 1.05rem; font-weight: 700; display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .persona-col-title.bunny     { color: #be185d; }
        .persona-col-title.alligator { color: #15803d; }
        .persona-col-title.pig       { color: #7c3aed; }

        .persona-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; }
        .persona-card.winner { border: 2px solid #f59e0b; background: #fffbeb; }
        .persona-card-header { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
        .winner-badge { color: #d97706; font-weight: 700; font-size: .8rem; }
        .set-winner-btn { background: #fef3c7; border: 1px solid #f59e0b; color: #92400e; padding: 3px 10px; border-radius: 4px; font-size: .8rem; cursor: pointer; }
        .set-winner-btn:hover { background: #fde68a; }
        .unset-btn { background: #374151; color: #fff; border: none; padding: 3px 10px; border-radius: 4px; font-size: .8rem; cursor: pointer; }
        .unset-btn:hover { background: #1f2937; }

        .persona-field { margin-bottom: 8px; }
        .persona-field label { display: block; font-size: .75rem; font-weight: 600; color: #6b7280; margin-bottom: 3px; text-transform: uppercase; }
        .persona-field textarea { width: 100%; box-sizing: border-box; border: 1px solid #d1d5db; border-radius: 5px; padding: 6px 8px; font-size: .9rem; resize: vertical; min-height: 52px; font-family: inherit; }
        .persona-field textarea:focus { outline: none; border-color: #2563eb; }

        .persona-regen-btn { background: #f3f4f6; border: 1px solid #d1d5db; padding: 5px 12px; border-radius: 5px; font-size: .82rem; cursor: pointer; }
        .persona-regen-btn:hover { background: #e5e7eb; }
        .persona-regen-btn:disabled { opacity: .5; cursor: default; }

        .gen-all-btn { background: #2563eb; color: #fff; border: none; padding: 7px 16px; border-radius: 6px; font-size: .88rem; cursor: pointer; font-weight: 600; }
        .gen-all-btn:hover { background: #1d4ed8; }
        .gen-all-btn:disabled { background: #93c5fd; cursor: default; }
        .persona-placeholder { text-align: center; padding: 20px 0; color: #9ca3af; font-size: .88rem; }
    </style>
</head>
<body>

<div class="page-header">
    <a class="back-btn" href="/expert-preview?video={{ video_id }}">← Back to Review</a>
    <h1>Edit Finalized Questions &mdash; <code>{{ video_id }}</code></h1>
</div>

<!-- Tab Nav -->
<div class="tab-nav-wrap">
    <div class="tab-nav">
        <button class="tab-btn active" id="tab-btn-edit"      onclick="switchTab('edit')">Edit Questions</button>
        <button class="tab-btn"        id="tab-btn-companion" onclick="switchTab('companion')">Companion Questions</button>
    </div>
</div>

<!-- Save bar (shared) -->
<div class="save-bar">
    <button class="btn-save" id="saveAllBtn" onclick="saveAll()">Save All Changes</button>
    <span class="status-msg" id="statusMsg"></span>
</div>

<!-- Tab 1: Edit Questions -->
<div id="content-edit" class="tab-content active">
    <div id="segmentsContainer">
        <div class="loading">Loading finalized questions...</div>
    </div>
</div>

<!-- Tab 2: Companion Questions -->
<div id="content-companion" class="tab-content">
    <div id="companionContainer">
        <div class="loading">Loading...</div>
    </div>
</div>

<script>
const VIDEO_ID = "{{ video_id }}";
let segmentsData = [];
let companionRendered = false;
let activeTab = 'edit';

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(tab) {
    activeTab = tab;
    ['edit', 'companion'].forEach(t => {
        document.getElementById(`content-${t}`).classList.toggle('active', t === tab);
        document.getElementById(`tab-btn-${t}`).classList.toggle('active', t === tab);
    });
    if (tab === 'companion' && !companionRendered && segmentsData.length) {
        renderCompanionSegments();
    }
}

// ── Load questions on page load ───────────────────────────────────────────────
async function loadQuestions() {
    try {
        const res = await fetch(`/api/expert/video/${VIDEO_ID}/final-questions`);
        const json = await res.json();
        if (!json.success) {
            document.getElementById('segmentsContainer').innerHTML =
                `<div class="no-data">${json.message}</div>`;
            document.getElementById('companionContainer').innerHTML =
                `<div class="no-data">${json.message}</div>`;
            return;
        }
        segmentsData = json.data.segments || [];
        renderSegments();
        // If companion tab is already active, render it too
        if (activeTab === 'companion') renderCompanionSegments();
    } catch (e) {
        document.getElementById('segmentsContainer').innerHTML =
            `<div class="no-data">Failed to load questions: ${e.message}</div>`;
    }
}

// ── Pick which question index wins for a segment ──────────────────────────────
function winnerIndex(questions) {
    let bestIndex = -1, bestExpertRank = 9999, bestLlmRank = 9999;
    for (let i = 0; i < questions.length; i++) {
        const q = questions[i];
        if (q.trashed) continue;
        const expertRank = (q.expert_ranking && q.expert_ranking !== 0) ? Number(q.expert_ranking) : 9999;
        const llmRank    = (q.llm_ranking != null) ? Number(q.llm_ranking) : 9999;
        const isBetter   = expertRank < bestExpertRank ||
                           (expertRank === bestExpertRank && llmRank < bestLlmRank);
        if (isBetter) { bestIndex = i; bestExpertRank = expertRank; bestLlmRank = llmRank; }
    }
    return bestIndex;
}

// ════════════════════════════════════════════════════════════════════════════════
//  TAB 1 — Edit Questions
// ════════════════════════════════════════════════════════════════════════════════

function renderSegments() {
    const container = document.getElementById('segmentsContainer');
    if (!segmentsData.length) {
        container.innerHTML = '<div class="no-data">No segments found in finalized questions.</div>';
        return;
    }
    container.innerHTML = segmentsData.map((seg, si) => {
        const questions = seg.aiQuestions || [];
        const start = formatTime(seg.start);
        const end   = formatTime(seg.end);
        const winner = winnerIndex(questions);
        const questionsHtml = questions.length
            ? questions.map((q, qi) => questionCard(si, qi, q, qi === winner)).join('')
            : '<p style="color:#9ca3af;font-size:.9rem">No questions in this segment.</p>';
        return `
        <div class="segment-card">
            <div class="segment-title">Segment ${si + 1} &nbsp;<span style="font-weight:400;color:#6b7280">(${start} – ${end})</span></div>
            ${questionsHtml}
        </div>`;
    }).join('');
}

function questionCard(si, qi, q, isWinner) {
    const typeLabel  = (q.type || 'question').replace(/_/g, ' ');
    const dimmed     = q.trashed ? 'style="opacity:.45"' : '';
    const winnerStyle = isWinner
        ? 'border:2px solid #f59e0b;border-radius:8px;padding:10px;margin-bottom:4px;background:#fffbeb'
        : 'border:1px solid #e5e7eb;border-radius:8px;padding:10px;margin-bottom:4px';
    const setBtn = (!isWinner && !q.trashed)
        ? `<button onclick="setWinner(${si},${qi})" style="margin-left:8px;background:#fef3c7;border:1px solid #f59e0b;color:#92400e;padding:3px 10px;border-radius:4px;font-size:.8rem;cursor:pointer">Set as kids question</button>`
        : '';
    return `
    <div ${dimmed}>
        <div style="${winnerStyle}">
            <span class="type-badge">${typeLabel}</span>
            ${isWinner ? '<span style="color:#d97706;font-weight:700;font-size:.8rem;margin-left:8px">⭐ Kids will see this one</span>' : ''}
            ${setBtn}
            ${q.trashed ? '<span style="color:#ef4444;font-size:.8rem;margin-left:6px">⚠ trashed</span>' : ''}
            <div class="field-group" style="margin-top:8px">
                <label>Question</label>
                <textarea id="q_${si}_${qi}" onchange="syncToData(${si},${qi},'question',this.value)">${escHtml(q.question || q.q || '')}</textarea>
            </div>
            <div class="field-group">
                <label>Answer</label>
                <textarea id="a_${si}_${qi}" rows="2" onchange="syncToData(${si},${qi},'answer',this.value)">${escHtml(q.answer || q.a || '')}</textarea>
            </div>
            <button class="regen-btn" id="regen_${si}_${qi}" onclick="regenerate(${si},${qi})">🔄 Regenerate with AI</button>
        </div>
    </div>
    <hr style="border:none;border-top:1px solid #f3f4f6;margin:14px 0">`;
}

function setWinner(si, qi) {
    const questions = segmentsData[si].aiQuestions;
    for (let i = 0; i < questions.length; i++) {
        questions[i].expert_ranking = (i === qi) ? 1 : 2;
    }
    renderSegments();
    showStatus('Question selected! Hit "Save All Changes" to persist.', 'success');
}

function syncToData(si, qi, field, value) {
    if (segmentsData[si] && segmentsData[si].aiQuestions[qi]) {
        segmentsData[si].aiQuestions[qi][field] = value;
        if (field === 'question') segmentsData[si].aiQuestions[qi].q = value;
        if (field === 'answer')   segmentsData[si].aiQuestions[qi].a = value;
    }
}

async function regenerate(si, qi) {
    const seg = segmentsData[si];
    const q   = seg.aiQuestions[qi];
    const btn = document.getElementById(`regen_${si}_${qi}`);
    btn.disabled = true; btn.textContent = 'Regenerating...';
    try {
        const res = await fetch(`/api/expert/video/${VIDEO_ID}/regenerate-question`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                question_type:    q.type || 'open_ended',
                current_question: q.question || q.q || '',
                current_answer:   q.answer   || q.a || '',
                segment_start:    seg.start,
                segment_end:      seg.end,
            })
        });
        const json = await res.json();
        if (!json.success) throw new Error(json.message);
        document.getElementById(`q_${si}_${qi}`).value = json.question;
        document.getElementById(`a_${si}_${qi}`).value = json.answer;
        syncToData(si, qi, 'question', json.question);
        syncToData(si, qi, 'answer',   json.answer);
        showStatus('Regenerated! Review the new question, then Save All.', 'success');
    } catch (e) {
        showStatus(`Regeneration failed: ${e.message}`, 'error');
    } finally {
        btn.disabled = false; btn.textContent = '🔄 Regenerate with AI';
    }
}

// ════════════════════════════════════════════════════════════════════════════════
//  TAB 2 — Companion Questions
// ════════════════════════════════════════════════════════════════════════════════

const PERSONAS = ['bunny', 'alligator', 'pig'];
const PERSONA_EMOJI  = { bunny: '🐰', alligator: '🐊', pig: '🐷' };
const PERSONA_LABELS = { bunny: 'Bunny', alligator: 'Alligator', pig: 'Pig' };

function renderCompanionSegments() {
    const container = document.getElementById('companionContainer');
    container.innerHTML = '';

    if (!segmentsData.length) {
        container.innerHTML = '<div class="no-data">No segments found.</div>';
        return;
    }

    segmentsData.forEach((seg, si) => {
        const start = formatTime(seg.start);
        const end   = formatTime(seg.end);

        const div = document.createElement('div');
        div.className = 'segment-companion';
        div.id = `companion-seg-${si}`;

        // Header row with segment label + generate button
        const headerDiv = document.createElement('div');
        headerDiv.style.cssText = 'display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:4px';
        headerDiv.innerHTML = `
            <span class="segment-title" style="margin-bottom:0">
                Segment ${si + 1} &nbsp;<span style="font-weight:400;color:#6b7280">(${start} – ${end})</span>
            </span>
            <button class="gen-all-btn" id="gen-btn-${si}" onclick="generateForSegment(${si})">
                ✨ Generate Companion Questions
            </button>
        `;
        div.appendChild(headerDiv);

        // 3-column persona grid
        const grid = document.createElement('div');
        grid.className = 'persona-grid';
        grid.id = `persona-grid-${si}`;

        PERSONAS.forEach(persona => {
            const col = document.createElement('div');
            col.className = `persona-col ${persona}`;
            col.id = `persona-col-${si}-${persona}`;
            col.innerHTML = `
                <div class="persona-col-title ${persona}">
                    ${PERSONA_EMOJI[persona]} ${PERSONA_LABELS[persona]} Questions
                </div>
                <div class="persona-cards-wrap" id="persona-cards-${si}-${persona}">
                    <div class="persona-placeholder">Press "Generate" to load questions.</div>
                </div>
            `;
            grid.appendChild(col);
        });

        div.appendChild(grid);
        container.appendChild(div);

        // If variants are already stored, render them immediately
        if (seg.persona_variants) {
            _renderPersonaCards(si, seg.persona_variants);
        }
    });

    companionRendered = true;
}

// ── Generate persona variants for one segment ─────────────────────────────────
async function generateForSegment(si) {
    const seg = segmentsData[si];
    const btn = document.getElementById(`gen-btn-${si}`);
    btn.disabled = true; btn.textContent = '✨ Generating...';

    // Show spinners in each column
    PERSONAS.forEach(p => {
        const wrap = document.getElementById(`persona-cards-${si}-${p}`);
        if (wrap) wrap.innerHTML = '<div class="persona-placeholder">Generating...</div>';
    });

    // Build questions dict from aiQuestions
    const questionsDict = {};
    (seg.aiQuestions || []).forEach(q => {
        if (!q.trashed && q.type) {
            questionsDict[q.type] = { q: q.question || q.q || '', a: q.answer || q.a || '' };
        }
    });

    if (!Object.keys(questionsDict).length) {
        showStatus('No questions to generate companions for.', 'error');
        btn.disabled = false; btn.textContent = '✨ Generate Companion Questions';
        return;
    }

    // Best question type (for the API)
    const winner  = winnerIndex(seg.aiQuestions || []);
    const bestType = winner >= 0 ? seg.aiQuestions[winner].type : null;

    try {
        const res = await fetch('/api/expert/questions/persona-variants', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ questions: questionsDict, best_question: bestType })
        });
        const json = await res.json();
        if (!json.success || !json.variants) throw new Error(json.message || 'Generation failed');

        seg.persona_variants = json.variants;
        // Preserve any existing winner selection
        if (!seg.persona_winner) seg.persona_winner = null;

        _renderPersonaCards(si, json.variants);
        showStatus('Companion questions generated! Edit as needed, then Save All.', 'success');
    } catch (e) {
        showStatus(`Generation failed: ${e.message}`, 'error');
        PERSONAS.forEach(p => {
            const wrap = document.getElementById(`persona-cards-${si}-${p}`);
            if (wrap) wrap.innerHTML = '<div class="persona-placeholder" style="color:#ef4444">Generation failed. Try again.</div>';
        });
    } finally {
        btn.disabled = false; btn.textContent = '✨ Generate Companion Questions';
    }
}

// ── Render all persona cards for a segment ────────────────────────────────────
function _renderPersonaCards(si, variants) {
    const seg = segmentsData[si];

    PERSONAS.forEach(persona => {
        const wrap = document.getElementById(`persona-cards-${si}-${persona}`);
        if (!wrap) return;
        wrap.innerHTML = '';

        const personaData = variants[persona] || {};
        if (!Object.keys(personaData).length) {
            wrap.innerHTML = '<div class="persona-placeholder">No questions generated.</div>';
            return;
        }

        Object.entries(personaData).forEach(([type, data]) => {
            if (!data || typeof data !== 'object') return;

            const isWinner = seg.persona_winner &&
                             seg.persona_winner.persona === persona &&
                             seg.persona_winner.type   === type;

            const cardId = `pcard-${si}-${persona}-${type}`;
            const card   = document.createElement('div');
            card.className = 'persona-card' + (isWinner ? ' winner' : '');
            card.id = cardId;

            const typeLabel = type.replace(/_/g, ' ');
            const winnerBadgeHtml  = isWinner
                ? `<span class="winner-badge">⭐ Kids will see this one</span>`
                : '';
            const actionBtnHtml = isWinner
                ? `<button class="unset-btn" onclick="unsetPersonaWinner(${si})">Unset</button>`
                : `<button class="set-winner-btn" onclick="setPersonaWinner(${si},'${persona}','${type}')">Set as kids question</button>`;

            card.innerHTML = `
                <div class="persona-card-header">
                    <span class="type-badge">${typeLabel}</span>
                    ${winnerBadgeHtml}
                    ${actionBtnHtml}
                </div>
                <div class="persona-field">
                    <label>Question</label>
                    <textarea id="pq_${si}_${persona}_${type}"
                        onchange="syncPersonaData(${si},'${persona}','${type}','q',this.value)">${escHtml(data.q || '')}</textarea>
                </div>
                <div class="persona-field">
                    <label>Answer</label>
                    <textarea id="pa_${si}_${persona}_${type}" rows="2"
                        onchange="syncPersonaData(${si},'${persona}','${type}','a',this.value)">${escHtml(data.a || '')}</textarea>
                </div>
                <button class="persona-regen-btn" id="pregen_${si}_${persona}_${type}"
                    onclick="regenPersonaCard(${si},'${persona}','${type}')">🔄 Regenerate</button>
            `;
            wrap.appendChild(card);
        });
    });
}

// ── Set/unset the winner among persona cards ──────────────────────────────────
function setPersonaWinner(si, persona, type) {
    segmentsData[si].persona_winner = { persona, type };
    _renderPersonaCards(si, segmentsData[si].persona_variants);
    showStatus('Question selected! Hit "Save All Changes" to persist.', 'success');
}

function unsetPersonaWinner(si) {
    segmentsData[si].persona_winner = null;
    _renderPersonaCards(si, segmentsData[si].persona_variants);
    showStatus('Selection cleared.', 'success');
}

// ── Keep persona data in sync as user types ───────────────────────────────────
function syncPersonaData(si, persona, type, field, value) {
    const seg = segmentsData[si];
    if (seg.persona_variants && seg.persona_variants[persona] && seg.persona_variants[persona][type]) {
        seg.persona_variants[persona][type][field] = value;
    }
}

// ── Regenerate a single persona card ─────────────────────────────────────────
async function regenPersonaCard(si, persona, type) {
    const seg = segmentsData[si];
    const btn = document.getElementById(`pregen_${si}_${persona}_${type}`);
    btn.disabled = true; btn.textContent = 'Regenerating...';

    // Use the base aiQuestion for this type as the source
    const baseQ = (seg.aiQuestions || []).find(q => q.type === type);
    const questionsDict = {};
    if (baseQ) {
        questionsDict[type] = { q: baseQ.question || baseQ.q || '', a: baseQ.answer || baseQ.a || '' };
    } else {
        // Fall back to current persona text
        const cur = seg.persona_variants?.[persona]?.[type];
        if (cur) questionsDict[type] = { q: cur.q || '', a: cur.a || '' };
    }

    try {
        const res = await fetch('/api/expert/questions/persona-variants', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ questions: questionsDict, best_question: null })
        });
        const json = await res.json();
        if (!json.success || !json.variants) throw new Error(json.message || 'Failed');

        const newData = json.variants[persona]?.[type];
        if (newData) {
            if (!seg.persona_variants)          seg.persona_variants = {};
            if (!seg.persona_variants[persona]) seg.persona_variants[persona] = {};
            seg.persona_variants[persona][type] = newData;

            // Update just the textareas without a full re-render
            const qEl = document.getElementById(`pq_${si}_${persona}_${type}`);
            const aEl = document.getElementById(`pa_${si}_${persona}_${type}`);
            if (qEl) qEl.value = newData.q || '';
            if (aEl) aEl.value = newData.a || '';
            showStatus('Regenerated! Review and Save All when ready.', 'success');
        }
    } catch (e) {
        showStatus(`Regeneration failed: ${e.message}`, 'error');
    } finally {
        btn.disabled = false; btn.textContent = '🔄 Regenerate';
    }
}

// ════════════════════════════════════════════════════════════════════════════════
//  Save All (shared — persists both tabs' data)
// ════════════════════════════════════════════════════════════════════════════════
async function saveAll() {
    const btn = document.getElementById('saveAllBtn');
    btn.disabled = true; btn.textContent = 'Saving...';
    try {
        const res = await fetch(`/api/expert/video/${VIDEO_ID}/update-questions`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ segments: segmentsData })
        });
        const json = await res.json();
        if (!json.success) throw new Error(json.message);
        showStatus('Saved successfully!', 'success');
    } catch (e) {
        showStatus(`Save failed: ${e.message}`, 'error');
    } finally {
        btn.disabled = false; btn.textContent = 'Save All Changes';
    }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function showStatus(msg, type) {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = `status-msg ${type}`;
    setTimeout(() => { el.textContent = ''; el.className = 'status-msg'; }, 4000);
}

function formatTime(secs) {
    if (secs == null) return '?';
    const m = Math.floor(secs / 60);
    const s = Math.floor(secs % 60);
    return `${m}:${s.toString().padStart(2, '0')}`;
}

function escHtml(str) {
    return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Kick off
loadQuestions();
</script>

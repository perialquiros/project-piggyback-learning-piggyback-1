<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Edit Questions - {{ video_id }}</title>
    <link rel="stylesheet" href="/assets/css/expert_preview.css">
    <style>
        body { font-family: sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
        .page-header { background: #fff; padding: 20px 24px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.1); display: flex; align-items: center; gap: 16px; }
        .page-header h1 { margin: 0; font-size: 1.4rem; }
        .page-header .back-btn { text-decoration: none; color: #555; border: 1px solid #ccc; padding: 6px 14px; border-radius: 6px; font-size: .9rem; }
        .page-header .back-btn:hover { background: #f0f0f0; }
        .save-bar { background: #fff; padding: 12px 24px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.1); display: flex; align-items: center; gap: 12px; }
        .btn-save { background: #2563eb; color: #fff; border: none; padding: 10px 24px; border-radius: 6px; font-size: 1rem; cursor: pointer; font-weight: 600; }
        .btn-save:hover { background: #1d4ed8; }
        .btn-save:disabled { background: #93c5fd; cursor: default; }
        .status-msg { font-size: .9rem; }
        .status-msg.success { color: #16a34a; }
        .status-msg.error { color: #dc2626; }
        .segment-card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.1); margin-bottom: 16px; padding: 20px 24px; }
        .segment-title { font-weight: 700; font-size: 1rem; color: #374151; margin-bottom: 14px; }
        .field-group { margin-bottom: 12px; }
        .field-group label { display: block; font-size: .8rem; font-weight: 600; color: #6b7280; margin-bottom: 4px; text-transform: uppercase; }
        .field-group textarea { width: 100%; box-sizing: border-box; border: 1px solid #d1d5db; border-radius: 6px; padding: 8px 10px; font-size: .95rem; resize: vertical; min-height: 60px; font-family: inherit; }
        .field-group textarea:focus { outline: none; border-color: #2563eb; }
        .regen-btn { background: #f3f4f6; border: 1px solid #d1d5db; padding: 6px 14px; border-radius: 6px; font-size: .85rem; cursor: pointer; }
        .regen-btn:hover { background: #e5e7eb; }
        .regen-btn:disabled { opacity: .5; cursor: default; }
        .type-badge { display: inline-block; background: #ede9fe; color: #6d28d9; padding: 2px 8px; border-radius: 4px; font-size: .75rem; margin-bottom: 8px; }
        .no-data { text-align: center; color: #9ca3af; padding: 60px 20px; }
        .loading { text-align: center; color: #6b7280; padding: 40px; }
    </style>
</head>
<body>

<div class="page-header">
    <a class="back-btn" href="/expert-preview?video={{ video_id }}">← Back to Review</a>
    <h1>Edit Finalized Questions &mdash; <code>{{ video_id }}</code></h1>
</div>

<div class="save-bar">
    <button class="btn-save" id="saveAllBtn" onclick="saveAll()">Save All Changes</button>
    <span class="status-msg" id="statusMsg"></span>
</div>

<div id="segmentsContainer">
    <div class="loading">Loading finalized questions...</div>
</div>

<script>
const VIDEO_ID = "{{ video_id }}";
let segmentsData = [];  // holds the full segments array from final_questions.json

// ── Load questions on page load ──────────────────────────────────────────────
async function loadQuestions() {
    try {
        const res = await fetch(`/api/expert/video/${VIDEO_ID}/final-questions`);
        const json = await res.json();
        if (!json.success) {
            document.getElementById('segmentsContainer').innerHTML =
                `<div class="no-data">${json.message}</div>`;
            return;
        }
        segmentsData = json.data.segments || [];
        renderSegments();
    } catch (e) {
        document.getElementById('segmentsContainer').innerHTML =
            `<div class="no-data">Failed to load questions: ${e.message}</div>`;
    }
}

// ── Render all segments into cards ───────────────────────────────────────────
function renderSegments() {
    const container = document.getElementById('segmentsContainer');
    if (!segmentsData.length) {
        container.innerHTML = '<div class="no-data">No segments found in finalized questions.</div>';
        return;
    }

    container.innerHTML = segmentsData.map((seg, si) => {
        const questions = (seg.aiQuestions || []);
        const start = formatTime(seg.start);
        const end = formatTime(seg.end);
        const questionsHtml = questions.length
            ? questions.map((q, qi) => questionCard(si, qi, q)).join('')
            : '<p style="color:#9ca3af;font-size:.9rem">No questions in this segment.</p>';

        return `
        <div class="segment-card">
            <div class="segment-title">Segment ${si + 1} &nbsp; <span style="font-weight:400;color:#6b7280">(${start} – ${end})</span></div>
            ${questionsHtml}
        </div>`;
    }).join('');
}

// ── Single question card HTML ────────────────────────────────────────────────
function questionCard(si, qi, q) {
    const typeLabel = (q.type || 'question').replace(/_/g, ' ');
    const trashed = q.trashed ? 'style="opacity:.45"' : '';
    return `
    <div ${trashed}>
        <span class="type-badge">${typeLabel}</span>
        ${q.trashed ? '<span style="color:#ef4444;font-size:.8rem;margin-left:6px">⚠ trashed</span>' : ''}
        <div class="field-group">
            <label>Question</label>
            <textarea id="q_${si}_${qi}" onchange="syncToData(${si},${qi},'question',this.value)">${escHtml(q.question || q.q || '')}</textarea>
        </div>
        <div class="field-group">
            <label>Answer</label>
            <textarea id="a_${si}_${qi}" rows="2" onchange="syncToData(${si},${qi},'answer',this.value)">${escHtml(q.answer || q.a || '')}</textarea>
        </div>
        <button class="regen-btn" id="regen_${si}_${qi}" onclick="regenerate(${si},${qi})">🔄 Regenerate with AI</button>
    </div>
    <hr style="border:none;border-top:1px solid #f3f4f6;margin:14px 0">`;
}

// ── Keep segmentsData in sync as user types ──────────────────────────────────
function syncToData(si, qi, field, value) {
    if (segmentsData[si] && segmentsData[si].aiQuestions[qi]) {
        segmentsData[si].aiQuestions[qi][field] = value;
        // also keep legacy fields aligned
        if (field === 'question') segmentsData[si].aiQuestions[qi].q = value;
        if (field === 'answer')   segmentsData[si].aiQuestions[qi].a = value;
    }
}

// ── Regenerate a single question via OpenAI ──────────────────────────────────
async function regenerate(si, qi) {
    const seg = segmentsData[si];
    const q = seg.aiQuestions[qi];
    const btn = document.getElementById(`regen_${si}_${qi}`);
    btn.disabled = true;
    btn.textContent = 'Regenerating...';

    try {
        const res = await fetch(`/api/expert/video/${VIDEO_ID}/regenerate-question`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                question_type: q.type || 'open_ended',
                current_question: q.question || q.q || '',
                current_answer: q.answer || q.a || '',
                segment_start: seg.start,
                segment_end: seg.end,
            })
        });
        const json = await res.json();
        if (!json.success) throw new Error(json.message);

        // Update the textareas and internal data
        document.getElementById(`q_${si}_${qi}`).value = json.question;
        document.getElementById(`a_${si}_${qi}`).value = json.answer;
        syncToData(si, qi, 'question', json.question);
        syncToData(si, qi, 'answer', json.answer);
        showStatus('Regenerated! Review the new question, then Save All.', 'success');
    } catch (e) {
        showStatus(`Regeneration failed: ${e.message}`, 'error');
    } finally {
        btn.disabled = false;
        btn.textContent = '🔄 Regenerate with AI';
    }
}

// ── Save all segments back to final_questions.json ───────────────────────────
async function saveAll() {
    const btn = document.getElementById('saveAllBtn');
    btn.disabled = true;
    btn.textContent = 'Saving...';
    try {
        const res = await fetch(`/api/expert/video/${VIDEO_ID}/update-questions`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ segments: segmentsData })
        });
        const json = await res.json();
        if (!json.success) throw new Error(json.message);
        showStatus('Saved successfully!', 'success');
    } catch (e) {
        showStatus(`Save failed: ${e.message}`, 'error');
    } finally {
        btn.disabled = false;
        btn.textContent = 'Save All Changes';
    }
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function showStatus(msg, type) {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = `status-msg ${type}`;
    setTimeout(() => { el.textContent = ''; el.className = 'status-msg'; }, 4000);
}

function formatTime(secs) {
    if (secs == null) return '?';
    const m = Math.floor(secs / 60);
    const s = Math.floor(secs % 60);
    return `${m}:${s.toString().padStart(2, '0')}`;
}

function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Kick off
loadQuestions();
</script>
</body>
</html>

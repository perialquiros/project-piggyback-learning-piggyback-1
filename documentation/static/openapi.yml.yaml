openapi: 3.0.3
info:
  title: Piggyback Learning API
  version: 0.1.0
  description: |
    OpenAPI contract for Piggyback Learning FastAPI backend.
    Note: authentication is currently password-verification based and not uniformly enforced on all routes.
    
servers:
  - url: http://localhost:8000
    description: Local development server
tags:
  - name: pages
  - name: auth
  - name: kids
  - name: expert
  - name: admin
  - name: media
x-websocket-contract:
  endpoint: /ws/questions/{video_id}
  clientPayload:
    start_seconds: integer
    interval_seconds: integer
    full_duration: boolean
  serverEvents:
    - status
    - segment_result
    - done
    - error

paths:
  /:
    get:
      tags: [pages]
      summary: Home page
      operationId: homePage
      responses:
        "200":
          description: HTML page
          content:
            text/html:
              schema:
                type: string

  /home:
    get:
      tags: [pages]
      summary: Home redirect page
      operationId: homeRedirectPage
      responses:
        "200":
          description: HTML page
          content:
            text/html:
              schema:
                type: string

  /children:
    get:
      tags: [pages]
      summary: Children interface page
      operationId: childrenPage
      responses:
        "200":
          description: HTML page
          content:
            text/html:
              schema:
                type: string

  /expert-preview:
    get:
      tags: [pages]
      summary: Expert preview page
      operationId: expertPreviewPage
      parameters:
        - name: file
          in: query
          required: false
          schema:
            type: string
        - name: video
          in: query
          required: false
          schema:
            type: string
        - name: mode
          in: query
          required: false
          schema:
            type: string
            default: review
      responses:
        "200":
          description: HTML page
          content:
            text/html:
              schema:
                type: string

  /admin/:
    get:
      tags: [pages]
      summary: Admin page
      operationId: adminPage
      responses:
        "200":
          description: HTML page
          content:
            text/html:
              schema:
                type: string

  /api/verify-password:
    post:
      tags: [auth]
      summary: Verify admin/expert password
      operationId: verifyPassword
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [user_type, password]
              properties:
                user_type:
                  type: string
                  enum: [admin, expert]
                password:
                  type: string
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyPasswordResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"

  /api/expert-annotations:
    post:
      tags: [expert]
      summary: Save expert annotations payload
      operationId: saveExpertAnnotations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Save result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"

  /api/videos-list:
    get:
      tags: [expert]
      summary: List downloaded videos
      operationId: listVideos
      responses:
        "200":
          description: Video list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideosListResponse"

  /api/expert-questions/{video_id}:
    get:
      tags: [expert]
      summary: Get expert questions for a video
      operationId: getExpertQuestions
      parameters:
        - name: video_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Questions payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"
        "404":
          description: Video/questions not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/expert-questions:
    post:
      tags: [expert]
      summary: Save expert question payload
      operationId: saveExpertQuestion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Save result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/save-final-questions:
    post:
      tags: [expert]
      summary: Save final expert-approved questions
      operationId: saveFinalQuestions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Save result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/tts:
    post:
      tags: [media]
      summary: Generate TTS audio
      operationId: synthesizeTts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TTSRequest"
      responses:
        "200":
          description: TTS generation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TTSResponse"
        "400":
          description: Missing/invalid text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Upstream TTS provider failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/download:
    post:
      tags: [admin]
      summary: Download video by URL
      operationId: apiDownload
      security:
        - PasswordGate: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  format: uri
      responses:
        "200":
          description: Download outcome
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"

  /api/frames/{video_id}:
    post:
      tags: [admin]
      summary: Extract one frame per second for a video
      operationId: extractFrames
      security:
        - PasswordGate: []
      parameters:
        - name: video_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Extraction result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FrameExtractionResponse"

  /api/admin/videos:
    get:
      tags: [admin]
      summary: List downloaded videos for admin workflows
      operationId: adminListVideos
      security:
        - PasswordGate: []
      parameters:
        - name: include_without_frames
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Admin video manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminVideosResponse"

  /api/submit-questions:
    post:
      tags: [admin]
      summary: Submit finalized questions
      operationId: submitQuestions
      security:
        - PasswordGate: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitQuestionsRequest"
      responses:
        "200":
          description: Submission saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitQuestionsResponse"
        "400":
          description: Missing video_id or questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Save failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/kids_videos:
    get:
      tags: [kids]
      summary: List kids videos
      operationId: listKidsVideos
      responses:
        "200":
          description: Kids video catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KidsVideosResponse"

  /api/final-questions/{video_id}:
    get:
      tags: [kids]
      summary: Get selected final questions for a video
      operationId: getFinalQuestions
      parameters:
        - name: video_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Final questions payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinalQuestionsResponse"

  /api/check_answer:
    post:
      tags: [kids]
      summary: Check a child's answer against expected answer
      operationId: checkAnswer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckAnswerRequest"
      responses:
        "200":
          description: Grading result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckAnswerResponse"

  /api/transcribe:
    post:
      tags: [media]
      summary: Transcribe uploaded audio
      operationId: transcribeAudio
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Transcription result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranscribeResponse"

  /api/config:
    get:
      tags: [kids]
      summary: Get frontend runtime config
      operationId: getConfig
      responses:
        "200":
          description: Config payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigResponse"

components:
  securitySchemes:
    PasswordGate:
      type: apiKey
      in: header
      name: X-Role-Password
      description: |
        Documentation placeholder for current password-gated admin/expert flow.
        Current implementation uses POST /api/verify-password and does not enforce a uniform token/session policy.

  schemas:
    GenericObject:
      type: object
      additionalProperties: true

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        error:
          type: string
        detail:
          type: object
          additionalProperties: true
      additionalProperties: true

    VerifyPasswordResponse:
      type: object
      properties:
        success:
          type: boolean
        redirect:
          type: string
        message:
          type: string
      required: [success]

    VideoListItem:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        thumbnail:
          type: string
        duration:
          type: number
        videoUrl:
          type: string
        questionCount:
          type: integer

    VideosListResponse:
      type: object
      properties:
        success:
          type: boolean
        videos:
          type: array
          items:
            $ref: "#/components/schemas/VideoListItem"
        message:
          type: string
      required: [success, videos]

    TTSRequest:
      type: object
      properties:
        text:
          type: string
        voice:
          type: string
          default: sage
        speed:
          type: number
          default: 0.75
        format:
          type: string
          default: mp3
      required: [text]

    TTSResponse:
      type: object
      properties:
        success:
          type: boolean
        audio:
          type: string
          description: Base64-encoded audio bytes
        format:
          type: string
        voice:
          type: string
        message:
          type: string
      required: [success]

    FrameExtractionResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        files:
          type: array
          items:
            type: string
        video_id:
          type: string
        output_dir:
          type: string
        count:
          type: integer

    AdminVideoItem:
      type: object
      properties:
        video_id:
          type: string
        title:
          type: string
        duration_seconds:
          type: number
        duration_formatted:
          type: string
        has_frames:
          type: boolean
        frame_count:
          type: integer
        has_questions:
          type: boolean
        frames_dir:
          type: string
        question_file:
          type: string

    AdminVideosResponse:
      type: object
      properties:
        success:
          type: boolean
        count:
          type: integer
        videos:
          type: array
          items:
            $ref: "#/components/schemas/AdminVideoItem"
        message:
          type: string
      required: [success, count, videos]

    SubmitQuestionsRequest:
      type: object
      required: [video_id, questions]
      properties:
        video_id:
          type: string
        questions:
          type: array
          items:
            type: object
            additionalProperties: true

    SubmitQuestionsResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        file_url:
          type: string
        file_path:
          type: string
      required: [success, message]

    KidsVideoItem:
      type: object
      properties:
        video_id:
          type: string
        title:
          type: string
        duration:
          type: string
        local_path:
          type: string
        thumbnail:
          type: string

    KidsVideosResponse:
      type: object
      properties:
        success:
          type: boolean
        count:
          type: integer
        videos:
          type: array
          items:
            $ref: "#/components/schemas/KidsVideoItem"
      required: [success, count, videos]

    FinalQuestionSegment:
      type: object
      properties:
        segment_range_start:
          type: integer
        segment_range_end:
          type: integer
        question:
          type: string
        answer:
          type: string
        llm_ranking:
          type: integer
        expert_ranking:
          type: integer

    FinalQuestionsResponse:
      type: object
      properties:
        success:
          type: boolean
        segments:
          type: array
          items:
            $ref: "#/components/schemas/FinalQuestionSegment"
        error:
          type: string
      required: [success]

    CheckAnswerRequest:
      type: object
      required: [expected, user]
      properties:
        expected:
          type: string
        user:
          type: string
        question:
          type: string

    CheckAnswerResponse:
      type: object
      properties:
        similarity:
          type: number
        expected:
          type: string
        user:
          type: string
        is_numeric:
          type: boolean
        status:
          type: string
          enum: [correct, almost, wrong]
        reason:
          type: string
      required: [similarity, expected, user, status]

    TranscribeResponse:
      type: object
      properties:
        success:
          type: boolean
        text:
          type: string
        error:
          type: string
      required: [success]

    ConfigResponse:
      type: object
      properties:
        skip_prevention:
          type: boolean
        thresholds:
          type: object
          additionalProperties: true
      required: [skip_prevention, thresholds]

    ValidationError:
      type: object
      properties:
        loc:
          type: array
          items:
            oneOf:
              - type: string
              - type: integer
        msg:
          type: string
        type:
          type: string
      required: [loc, msg, type]

    HTTPValidationError:
      type: object
      properties:
        detail:
          type: array
          items:
            $ref: "#/components/schemas/ValidationError"
